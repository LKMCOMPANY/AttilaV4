services:
  # ── Main Web Service ──────────────────────────────────────────────────
  # Pipeline workers (process + execute) and the Gorgone sweep worker run
  # as continuous loops inside server.mjs — no external cron needed.
  # Concurrency knobs are wired through env vars below.
  - type: web
    name: attila-v4
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CF_ACCESS_CLIENT_ID
        sync: false
      - key: CF_ACCESS_CLIENT_SECRET
        sync: false
      - key: GORGONE_SUPABASE_URL
        sync: false
      - key: GORGONE_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GORGONE_WEBHOOK_SECRET
        sync: false
      - key: ALERIA_API_KEY
        sync: false
      - key: ALERIA_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PIPELINE_PROCESS_CONCURRENCY
        value: "3"
      - key: PIPELINE_EXECUTE_CONCURRENCY
        value: "2"
      - key: PIPELINE_IDLE_MS
        value: "5000"
      - key: GORGONE_SWEEP_INTERVAL_MS
        value: "60000"
